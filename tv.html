<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shark Tank TV</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root {
    --bg-base: #0A0A0C;
    --bg-base-2: #111114;
    --bg-panel: #1C1E27;
    --bg-pill: #1A1C24;
    --border: #2A2D38;
    --accent-tank: #F97316;
    --accent-tank-glow: #FDBA74;
    --accent-shark: #5B9BC4;
    --accent-shark-glow: #9ED4F0;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --text-body: #A1A5AE;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg-base); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
</style>
</head>
<body>
<div id="app" style="width:3840px; height:2160px; background:linear-gradient(180deg, var(--bg-base) 0%, var(--bg-base-2) 100%); color:var(--text-primary); box-sizing:border-box; padding:56px 64px; display:flex; flex-direction:column; overflow:hidden;">

  <div style="display:flex; align-items:baseline; justify-content:space-between; margin-bottom:36px;">
    <div style="font-size:56px; font-weight:800; letter-spacing:-0.01em; color:var(--text-primary);">Shark Tank</div>
    <div id="roundLabel" style="font-size:32px; font-weight:700; color:var(--text-secondary);">Round 1</div>
  </div>

  <div style="display:flex; gap:56px; flex:1; min-height:0;">

    <div style="flex:1.1; display:flex; flex-direction:column; min-width:0;">
      <div style="font-size:34px; font-weight:800; margin-bottom:20px; color:var(--text-primary);">Leaderboard</div>

      <div style="font-size:26px; font-weight:800; color:var(--accent-tank); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:14px;">Tanks</div>
      <div style="display:flex; align-items:center; gap:16px; padding:0 26px; font-size:20px; color:var(--text-secondary); margin-bottom:8px;">
        <div style="flex:1;"></div>
        <div style="width:90px; text-align:center;">Sub</div>
        <div style="width:120px; text-align:center;">No Sub</div>
        <div style="width:90px; text-align:center;">Loss</div>
        <div style="width:90px; text-align:right;">Pts</div>
      </div>
      <div id="tankBoard" style="display:flex; flex-direction:column; gap:10px; margin-bottom:34px;"></div>

      <div style="font-size:26px; font-weight:800; color:var(--accent-shark); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:14px;">Sharks</div>
      <div style="display:flex; align-items:center; gap:16px; padding:0 26px; font-size:20px; color:var(--text-secondary); margin-bottom:8px;">
        <div style="flex:1;"></div>
        <div style="width:90px; text-align:center;">Sub</div>
        <div style="width:120px; text-align:center;">No Sub</div>
        <div style="width:90px; text-align:center;">Loss</div>
        <div style="width:90px; text-align:right;">Pts</div>
      </div>
      <div id="sharkBoard" style="display:flex; flex-direction:column; gap:10px; overflow-y:auto;"></div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
      <div style="font-size:34px; font-weight:800; margin-bottom:20px; color:var(--text-primary);">Matchups <span style="font-size:20px; font-weight:500; color:var(--text-secondary);">— net points, tank vs shark</span></div>
      <div style="flex:1; overflow:auto; border:1px solid var(--border); border-radius:20px; background:var(--bg-panel);">
        <div id="matrix"></div>
      </div>
    </div>

  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDbf0G4k5LZV9IFW3yv80myWVGgQXcw1Ic",
  authDomain: "shark-tank-scoreboard.firebaseapp.com",
  databaseURL: "https://shark-tank-scoreboard-default-rtdb.firebaseio.com",
  projectId: "shark-tank-scoreboard",
  storageBucket: "shark-tank-scoreboard.firebasestorage.app",
  messagingSenderId: "215756049591",
  appId: "1:215756049591:web:edac2f03077dbc57641132"
};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

let state = { tanks: [], sharks: [], results: {}, round: 1 };

try {
  if (!window.firebase.apps.length) window.firebase.initializeApp(FIREBASE_CONFIG);
  window.firebase.database().ref('sharkTank').on('value', (snap) => {
    const val = snap.val();
    if (val) {
      state = {
        tanks: val.tanks || [],
        sharks: val.sharks || [],
        results: val.results || {},
        round: val.round || 1
      };
      render();
    }
  });
} catch (e) { console.warn('Firebase sync unavailable', e); }

function cellStyle(net) {
  const base = 'font-size:28px; font-weight:800; min-width:60px; text-align:center;';
  if (net > 0) return base + 'color:var(--accent-tank);';
  if (net < 0) return base + 'color:var(--accent-shark);';
  return base + 'color:var(--text-secondary);';
}

function boardRow(p, accent) {
  return `<div style="display:flex; align-items:center; gap:16px; background:var(--bg-panel); border:1px solid var(--border); border-radius:16px; padding:18px 26px;">
    <div style="font-size:30px; font-weight:700; flex:1; color:var(--text-primary);">${escapeHtml(p.name)}</div>
    <div style="font-size:26px; width:90px; text-align:center; color:var(--text-body);">${p.subs}</div>
    <div style="font-size:26px; width:120px; text-align:center; color:var(--text-body);">${p.noSub}</div>
    <div style="font-size:26px; width:90px; text-align:center; color:var(--text-body);">${p.losses}</div>
    <div style="font-size:36px; font-weight:800; width:90px; text-align:right; color:${accent};">${p.points}</div>
  </div>`;
}

function render() {
  const { tanks, sharks, results, round } = state;

  document.getElementById('roundLabel').textContent = 'Round ' + round;

  const tankStats = {};
  const sharkStats = {};
  const getStat = (map, name) => map[name] || (map[name] = { name, subs: 0, noSub: 0, losses: 0, points: 0 });
  tanks.forEach(t => getStat(tankStats, t.name));
  sharks.forEach(s => getStat(sharkStats, s.name));

  const pairNet = {};
  const getPair = (tankId, sharkId) => {
    const key = tankId + '_' + sharkId;
    return pairNet[key] || (pairNet[key] = { tankPts: 0, sharkPts: 0 });
  };

  Object.entries(results).forEach(([key, result]) => {
    const parts = key.split('_');
    const tankId = parts[1], sharkId = parts[2];
    const tank = tanks.find(t => t.id === tankId);
    const shark = sharks.find(s => s.id === sharkId);
    if (!tank || !shark) return;
    const tStat = getStat(tankStats, tank.name);
    const sStat = getStat(sharkStats, shark.name);
    const pair = getPair(tankId, sharkId);
    if (result === 'none') { tStat.noSub += 1; tStat.points += 1; pair.tankPts += 1; }
    else if (result === 'tank') { tStat.subs += 1; tStat.points += 3; sStat.losses += 1; pair.tankPts += 3; }
    else if (result === 'shark') { sStat.subs += 1; sStat.points += 1; tStat.losses += 1; pair.sharkPts += 1; }
  });

  const sortBoard = (map) => Object.values(map).sort((a, b) => b.points - a.points);
  const tankBoard = sortBoard(tankStats);
  const sharkBoard = sortBoard(sharkStats);

  document.getElementById('tankBoard').innerHTML = tankBoard.map(p => boardRow(p, 'var(--accent-tank)')).join('');
  document.getElementById('sharkBoard').innerHTML = sharkBoard.map(p => boardRow(p, 'var(--accent-shark)')).join('');

  let matrixHtml = `<div style="display:grid; grid-template-columns:220px repeat(${tanks.length}, 1fr); min-width:max-content;">`;
  matrixHtml += `<div style="background:var(--bg-pill); border-bottom:2px solid var(--border); border-right:2px solid var(--border); padding:16px; position:sticky; left:0; z-index:2;"></div>`;
  tanks.forEach(tank => {
    matrixHtml += `<div style="background:var(--bg-pill); border-bottom:2px solid var(--border); border-right:1px solid var(--border); padding:16px 10px; font-size:24px; font-weight:700; text-align:center; min-width:150px; color:var(--text-primary);">${escapeHtml(tank.name)}</div>`;
  });
  sharks.forEach(shark => {
    matrixHtml += `<div style="background:var(--bg-pill); border-bottom:1px solid var(--border); border-right:2px solid var(--border); padding:16px; font-size:24px; font-weight:700; display:flex; align-items:center; position:sticky; left:0; color:var(--text-primary);">${escapeHtml(shark.name)}</div>`;
    tanks.forEach(tank => {
      const pair = pairNet[tank.id + '_' + shark.id];
      const net = pair ? pair.tankPts - pair.sharkPts : 0;
      const hasData = !!pair;
      const label = hasData ? (net > 0 ? '+' + net : String(net)) : '—';
      matrixHtml += `<div style="border-bottom:1px solid var(--border); border-right:1px solid var(--border); padding:10px; display:flex; align-items:center; justify-content:center; min-height:80px;">
        <div style="${cellStyle(hasData ? net : 0)}">${label}</div>
      </div>`;
    });
  });
  matrixHtml += `</div>`;

  document.getElementById('matrix').innerHTML = matrixHtml;
}

render();
</script>
</body>
</html>
